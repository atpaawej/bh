<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span>Bharat</span>Hunt</a>
      <div class="nav-center">
        <a href="index.html" class="nav-link">Discover</a>
        <a href="leaderboard.html" class="nav-link">Leaderboard</a>
        <a href="category.html" class="nav-link">Categories</a>
        <a href="launch.html" class="nav-link">Launch</a>
      </div>
      <div class="nav-right">
        <a href="login.html" class="nav-link active">Sign in</a>
        <a href="launch.html" class="btn-primary btn-sm">Get Started</a>
        <button class="nav-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <p class="mono-label" style="margin-bottom:16px;">Welcome back</p>
      <h1>Sign in to BharatHunt</h1>
      <p class="sub">Vote, comment, and launch products with the community.</p>

      <button class="oauth-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="oauth-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M9 0C4.03 0 0 4.13 0 9.22c0 4.07 2.58 7.52 6.16 8.74.45.08.61-.2.61-.44v-1.54c-2.5.56-3.03-1.23-3.03-1.23-.41-1.07-1-1.35-1-1.35-.82-.57.06-.56.06-.56.9.07 1.38.95 1.38.95.8 1.41 2.11 1 2.62.77.08-.6.31-1 .57-1.23-2-.23-4.1-1.03-4.1-4.56 0-1.01.35-1.83.93-2.48-.09-.23-.4-1.17.09-2.44 0 0 .76-.25 2.5.95a8.4 8.4 0 014.54 0c1.73-1.2 2.5-.95 2.5-.95.49 1.27.18 2.21.09 2.44.58.65.93 1.47.93 2.48 0 3.54-2.11 4.33-4.12 4.56.32.29.61.85.61 1.71v2.54c0 .24.16.53.62.44A9.23 9.23 0 0018 9.22C18 4.13 13.97 0 9 0z"/></svg>
        Continue with GitHub
      </button>

      <div class="auth-divider">or</div>

      <form onsubmit="return false;" style="text-align:left;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@email.com" />
        </div>
        <button type="submit" class="btn-primary btn-block" style="margin-top:8px;">Send magic link</button>
      </form>

      <p style="font-size:12px;color:var(--muted);margin-top:24px;line-height:1.5;">
        By continuing you agree to our <a href="#" style="text-decoration:underline;">Terms</a> and <a href="#" style="text-decoration:underline;">Privacy Policy</a>.
      </p>
    </div>
  </div>

</body>
</html>
