name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode review
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Review this pull request using the following methodology:

            ## Two-axis review
            Run both axes and report findings separately — do not merge.

            ### Axis 1: Standards
            Check the code against:
            - Any documented standards in the repo (CODING_STANDARDS.md, CONTRIBUTING.md, CLAUDE.md, etc.)
            - The Fowler smell baseline below
            Rules: repo standards override the baseline. Everything is a judgement call, not a hard violation. Skip anything tooling already enforces.

            Smell baseline (Fowler, Refactoring ch.3):
            - Mysterious Name — function/variable/type name doesn't reveal what it does → rename
            - Duplicated Code — same logic shape in multiple hunks/files → extract and share
            - Feature Envy — method reaches into another object's data more than its own → move it
            - Data Clumps — same fields/params travel together → bundle into one type
            - Primitive Obsession — primitive/string for a domain concept → give it its own type
            - Repeated Switches — same switch/if-cascade on same type → polymorphism or shared map
            - Shotgun Surgery — one logical change forces scattered edits → gather into one module
            - Divergent Change — one file edited for unrelated reasons → split by reason
            - Speculative Generality — abstraction added for needs the spec doesn't have → delete
            - Message Chains — long a.b().c().d() navigation → hide behind one method
            - Middle Man — class/function mostly delegates → cut it, call the real target
            - Refused Bequest — subclass ignores most of what it inherits → composition over inheritance

            ### Axis 2: Spec
            Find the originating spec:
            1. Check commit messages for issue references (e.g. "#4", "Closes #4") — fetch the issue via `gh issue view`
            2. Look under docs/, specs/ for matching files
            3. If nothing is found, skip this axis and report "no spec available"

            Report: (a) requirements the spec asked for that are missing or partial; (b) behaviour in the diff that wasn't asked for (scope creep); (c) requirements that look implemented but where the implementation looks wrong.

            ## Output format
            Present findings under `## Standards` and `## Spec` headings. Do not merge findings across axes.
            End with a one-line summary: total findings per axis and the worst issue within each axis.
